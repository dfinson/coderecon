# CodeRecon Recon Baseline Evaluation
#
# Evaluates recon's file retrieval quality against ground-truth issue annotations.
# Requires a running CodeRecon daemon on the target repo.
#
# Prerequisites:
#   1. Start CodeRecon daemon on the target repo
#   2. Set CPL_BENCH_TARGET_REPO env var (default: ~/wsl-repos/evees/evee_cpl/evee)
#
# Run:
#   cd benchmarking && python run.py experiments/recon_baseline.yaml

experiment:
  name: cpl-recon-baseline
  description: >-
    Evaluate CodeRecon recon file retrieval precision, recall, F1,
    and tier alignment against hand-annotated ground truth across
    24 issues × 3 query levels (anchored, exploratory, vague).
  version: "1.0"
  output_path: experiments/output/recon_baseline

  max_workers: 4  # daemon serializes internally; 4 is safe per concurrency testing

  tracking_backend:
    type: local

  models:
    - name: cpl-recon
      args:
        - daemon_port: [7777]
        - timeout: [300]

  dataset:
    name: cpl-recon-gt
    type: custom
    args:
      data_path: data/ground_truth.json

  metrics:
    - name: cpl-retrieval
      mapping:
        returned_tiers: model.returned_tiers
        gt_files: dataset.gt_files
