# Ranking vs Heuristic — Head-to-Head Comparison
#
# Paired experiment: same task/query sets evaluated by both the current
# heuristic recon pipeline (RRF + elbow) and the ranking pipeline
# (ranker + cutoff + gate).
#
# Run:
#   cd benchmarking && python run.py experiments/ranking_vs_heuristic.yaml

experiment:
  name: cpl-ranking-vs-heuristic
  description: >-
    Head-to-head comparison of the ranking pipeline against the
    heuristic recon pipeline on identical queries.  Measures F1 delta,
    precision delta, recall delta, and gate accuracy.
  version: "1.0"
  output_path: experiments/output/ranking_vs_heuristic

  max_workers: 4

  tracking_backend:
    type: local

  models:
    - name: cpl-recon
      args:
        - daemon_port: [7777]
        - timeout: [300]
    - name: cpl-ranking
      args:
        - daemon_port: [7777]
        - timeout: [300]

  dataset:
    name: cpl-ranking-gt
    type: custom
    args:
      data_dir: data/ranking_ground_truth

  metrics:
    - name: cpl-retrieval
      mapping:
        returned_tiers: model.returned_tiers
        gt_files: dataset.gt_files
    - name: cpl-ranking
      mapping:
        ranked_def_uids: model.ranked_def_uids
        predicted_relevances: model.predicted_relevances
        predicted_n: model.predicted_n
        gt_edited: dataset.gt_edited
        gt_read_necessary: dataset.gt_read_necessary
