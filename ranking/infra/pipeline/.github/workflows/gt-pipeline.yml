name: Ground Truth Pipeline

on:
  pull_request:
    types: [ready_for_review]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  auto-merge-and-advance:
    if: github.actor == 'copilot-swe-agent[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect stage from PR labels
        id: stage
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          LABELS=$(gh pr view ${{ github.event.pull_request.number }} --json labels -q '.labels[].name' || echo "")
          echo "labels=$LABELS" >> "$GITHUB_OUTPUT"

          CURRENT="unknown"
          for STAGE in auditor executor-a executor-b executor-c reviewer; do
            if echo "$LABELS" | grep -q "gt:${STAGE}"; then
              CURRENT="$STAGE"
              break
            fi
          done
          echo "current=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "Detected stage: $CURRENT"

      - name: Squash merge the PR
        if: steps.stage.outputs.current != 'unknown'
        env:
          GH_TOKEN: ${{ secrets.GT_PAT }}
        run: |
          sleep 5
          gh pr merge ${{ github.event.pull_request.number }} --squash --delete-branch || \
            echo "Merge failed or already merged"

      - name: Read pipeline config
        if: steps.stage.outputs.current != 'unknown'
        id: config
        run: |
          if [[ -f .gt-pipeline.json ]]; then
            echo "repo_id=$(jq -r '.repo_id' .gt-pipeline.json)" >> "$GITHUB_OUTPUT"
            echo "set=$(jq -r '.set' .gt-pipeline.json)" >> "$GITHUB_OUTPUT"
            echo "codeplane_repo=$(jq -r '.codeplane_repo' .gt-pipeline.json)" >> "$GITHUB_OUTPUT"
            echo "base_branch=$(jq -r '.base_branch' .gt-pipeline.json)" >> "$GITHUB_OUTPUT"
          else
            echo "ERROR: .gt-pipeline.json not found"
            exit 1
          fi

      - name: Create executor issues (after auditor)
        if: steps.stage.outputs.current == 'auditor'
        env:
          GH_TOKEN: ${{ secrets.GT_PAT }}
        run: |
          REPO="${{ github.repository }}"
          REPO_ID="${{ steps.config.outputs.repo_id }}"
          BASE="${{ steps.config.outputs.base_branch }}"

          create_executor_issue() {
            local SESSION="$1" TIER="$2" RANGE="$3" SKIP="$4" EXTRA="${5:-}"

            jq -n \
              --arg title "GT Executor Session ${SESSION^^} (${TIER} tasks) — ${REPO_ID}" \
              --arg body "## Instructions

          Read \`.gt-roles/executor.md\` — those are your instructions.
          Read \`.gt-tasks.md\` — those are your tasks.

          **Output**: Write JSON files to \`ground_truth/{heading_id}.json\` at repo root.
          **Scope**: Execute tasks ${RANGE} only. Skip all ${SKIP} tasks.
          Do NOT touch files from other sessions.
          ${EXTRA}

          Begin." \
              --arg label "gt:executor-${SESSION}" \
              --arg repo "$REPO" \
              --arg base "$BASE" \
              --arg instr "You are the task executor. Read .gt-roles/executor.md for full instructions. Read .gt-tasks.md for tasks. Write output to ground_truth/ at repo root. Execute only ${TIER} tasks (${RANGE}). Do NOT touch other sessions files." \
              '{
                title: $title,
                body: $body,
                labels: [$label],
                assignees: ["copilot-swe-agent[bot]"],
                agent_assignment: {
                  target_repo: $repo,
                  base_branch: $base,
                  custom_instructions: $instr,
                  custom_agent: "",
                  model: "claude-sonnet-4.6"
                }
              }' | gh api --method POST "/repos/${REPO}/issues" --input -

            echo "Created executor-${SESSION} issue"
          }

          create_executor_issue "a" "N" "N1 through N10 and N11" "M and W"
          create_executor_issue "b" "M" "M1 through M10 and M11" "N and W"
          create_executor_issue "c" "W" "W1 through W10 and W11" "N and M" \
            "After all W tasks, execute STEP 4 (non-OK queries)."

      - name: Check all executors done
        if: contains(steps.stage.outputs.current, 'executor')
        id: check-executors
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REPO="${{ github.repository }}"
          ALL_DONE=true

          for LABEL in gt:executor-a gt:executor-b gt:executor-c; do
            OPEN=$(gh issue list --repo "$REPO" --label "$LABEL" --state open --json number -q 'length')
            if [[ "$OPEN" -gt 0 ]]; then
              ALL_DONE=false
              echo "$LABEL: $OPEN open"
            else
              echo "$LABEL: done"
            fi
          done

          echo "all_done=$ALL_DONE" >> "$GITHUB_OUTPUT"

      - name: Create reviewer issue (all executors done)
        if: contains(steps.stage.outputs.current, 'executor') && steps.check-executors.outputs.all_done == 'true'
        env:
          GH_TOKEN: ${{ secrets.GT_PAT }}
        run: |
          REPO="${{ github.repository }}"
          REPO_ID="${{ steps.config.outputs.repo_id }}"
          BASE="${{ steps.config.outputs.base_branch }}"

          jq -n \
            --arg title "GT Reviewer — ${REPO_ID}" \
            --arg body "## Instructions

          Read \`.gt-roles/reviewer.md\` — those are your instructions.
          Read \`.gt-tasks.md\` — those are your tasks.
          Ground truth outputs are in \`ground_truth/\` at repo root.

          **Path note**: Where the role file says \`../../data/{repo_id}/ground_truth/\`, read \`ground_truth/\` instead.
          Do NOT run the merge script — it runs automatically after review.

          Begin." \
            --arg repo "$REPO" \
            --arg base "$BASE" \
            --arg instr "You are the outputs reviewer. Read .gt-roles/reviewer.md for full instructions. Read .gt-tasks.md for tasks. Ground truth files are in ground_truth/ at repo root. Do NOT run the merge script." \
            '{
              title: $title,
              body: $body,
              labels: ["gt:reviewer"],
              assignees: ["copilot-swe-agent[bot]"],
              agent_assignment: {
                target_repo: $repo,
                base_branch: $base,
                custom_instructions: $instr,
                custom_agent: "",
                model: "claude-opus-4.6"
              }
            }' | gh api --method POST "/repos/${REPO}/issues" --input -

          echo "Created reviewer issue"

      - name: Export ground truth to codeplane
        if: steps.stage.outputs.current == 'reviewer'
        env:
          GH_TOKEN: ${{ secrets.GT_PAT }}
          REPO_ID: ${{ steps.config.outputs.repo_id }}
          CODEPLANE_REPO: ${{ steps.config.outputs.codeplane_repo }}
        run: |
          if [[ ! -d ground_truth ]] || [[ -z "$(ls ground_truth/*.json 2>/dev/null)" ]]; then
            echo "ERROR: No ground truth files found"
            exit 1
          fi

          echo "Ground truth files found:"
          ls ground_truth/*.json | wc -l

          git clone --depth 1 --branch feat/recon-tool \
            "https://x-access-token:${GH_TOKEN}@github.com/${CODEPLANE_REPO}.git" \
            /tmp/codeplane 2>/dev/null || \
          git clone --depth 1 \
            "https://x-access-token:${GH_TOKEN}@github.com/${CODEPLANE_REPO}.git" \
            /tmp/codeplane

          cd /tmp/codeplane

          TARGET_DIR="ranking/data/${REPO_ID}/ground_truth"
          mkdir -p "$TARGET_DIR"
          cp "$GITHUB_WORKSPACE"/ground_truth/*.json "$TARGET_DIR/"

          if [[ -f ranking/infra/merge_ground_truth.py ]]; then
            python3 ranking/infra/merge_ground_truth.py "ranking/data/${REPO_ID}" || \
              echo "Warning: merge script failed"
          fi

          BRANCH="gt/${REPO_ID}"
          git checkout -b "$BRANCH"
          git add -A
          git config user.name "gt-pipeline"
          git config user.email "gt-pipeline@users.noreply.github.com"

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "feat(ranking): add ground truth for ${REPO_ID}"
          git push origin "$BRANCH"

          gh pr create \
            --repo "$CODEPLANE_REPO" \
            --base "feat/recon-tool" \
            --head "$BRANCH" \
            --title "Ground truth: ${REPO_ID}" \
            --body "Auto-generated ground truth from the GT pipeline.

          Source: ${{ github.repository }}
          Tasks: 33 (N1-N11, M1-M11, W1-W11)
          Models: Sonnet 4.6 (executor) / Opus 4.6 (reviewer)"

          echo "PR created in ${CODEPLANE_REPO}"

      - name: Delete fork
        if: steps.stage.outputs.current == 'reviewer'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GT_PAT }}
        run: |
          sleep 15
          gh api --method DELETE "/repos/${{ github.repository }}" || \
            echo "Fork deletion skipped (needs delete_repo scope)"
