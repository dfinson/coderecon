# Recon Lab — default configuration.
# Override per-field via CLI flags or CPL_LAB_* env vars.

[workspace]
# Base directory for mutable data (clones, ground truth, signals, models).
# Override: --workspace CLI flag.
path = "~/.recon/recon-lab"

[clone]
jobs = 4
depth = 1  # shallow clone depth (1 = single commit)

[index]
timeout = 1800  # 30 minutes per repo

[mine]
max_prs = 100
llm_model = "claude-haiku-4.5"

[train]
# "auto" resolves to $workspace/data
data_dir = "auto"

[eval]
default_experiment = "recon_ranking.yaml"
