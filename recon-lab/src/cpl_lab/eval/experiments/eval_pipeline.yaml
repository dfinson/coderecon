# CodeRecon Ranking Pipeline Evaluation (In-Process)
#
# Evaluates the full ranking pipeline (gate + ranker + cutoff) against
# def-level ground truth from the eval repo set.
#
# Prerequisites:
#   1. Clone eval repos:     recon-lab clone --set eval
#   2. Index eval repos:     recon-lab index --set eval
#   3. Generate ground truth (or have it present in data dirs)
#
# Run:
#   recon-lab eval experiments/eval_pipeline.yaml

experiment:
  name: recon-eval-pipeline
  description: >-
    In-process evaluation of the ranking pipeline end-to-end:
    gate classification, ranker NDCG/Hit@K, and cutoff F1/P/R
    against def-level ground truth from the eval repo set.
  version: "1.0"
  output_path: output/eval_pipeline

  max_workers: 1   # Sequential — each repo loads its own index

  tracking_backend:
    type: local

  models:
    - name: recon-ranking
      args:
        - clone_dir: ["~/.recon-lab/clones"]
        - mode: ["baseline", "ranking"]
        - models_dir: ["~/.recon-lab/models"]

  dataset:
    name: recon-eval-gt
    type: custom
    args:
      data_dir: "~/.recon-lab/data"

  metrics:
    - name: recon-ranking
      mapping:
        ranked_def_uids: model.ranked_def_uids
        predicted_relevances: model.predicted_relevances
        predicted_n: model.predicted_n
        gt_edited: dataset.gt_edited
        gt_read_necessary: dataset.gt_read_necessary
        query_type: dataset.query_type
    - name: recon-gate
      mapping:
        predicted_gate: model.predicted_gate
        gt_gate: dataset.label_gate
        query_type: dataset.query_type
