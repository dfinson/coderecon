$schema: https://azuremlschemas.azureedge.net/latest/commandComponent.schema.json

name: recon_lab_collect
display_name: "Collect Signals"
version: "1"
description: "Collect retrieval signals via in-process coderecon API. CPU-heavy."

inputs:
  workspace:
    type: uri_folder
    description: "Mounted workspace root (blob datastore)."
  repo_set:
    type: string
    default: "all"
  workers:
    type: integer
    default: 6
    description: "Parallel collection workers."

environment:
  image: mcr.microsoft.com/azureml/openmpi4.1.0-ubuntu22.04
  conda_file: ../environments/conda-pipeline.yml

code: ../../src

command: >-
  export PYTHONPATH=.:$PYTHONPATH &&
  recon-lab collect
  --workspace ${{inputs.workspace}}
  --set ${{inputs.repo_set}}
  --workers ${{inputs.workers}}
