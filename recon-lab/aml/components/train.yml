$schema: https://azuremlschemas.azureedge.net/latest/commandComponent.schema.json

name: recon_lab_train
display_name: "Train Models"
version: "1"
description: "Train 4 structural LightGBM ranking models (gate, file-ranker, def-ranker, cutoff)."

inputs:
  workspace:
    type: uri_folder
    description: "Mounted workspace root (blob datastore)."

outputs:
  models:
    type: uri_folder
    description: "Trained model artifacts (.lgbm files + metrics JSON)."

environment:
  image: mcr.microsoft.com/azureml/openmpi4.1.0-ubuntu22.04
  conda_file: ../environments/conda-pipeline.yml

code: ../../src

command: >-
  export PYTHONPATH=.:$PYTHONPATH &&
  python -m cpl_lab.train_all
  --data-dir ${{inputs.workspace}}/data
  --output-dir ${{outputs.models}}
  --skip-merge
