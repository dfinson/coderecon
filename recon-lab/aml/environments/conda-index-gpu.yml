# GPU-accelerated environment for the indexing step.
# Uses CUDA 12 + ONNX Runtime GPU for SPLADE vectorization.
# Tree-sitter grammars are identical to the full pipeline env.

name: coderecon-index-gpu
channels:
  - conda-forge
dependencies:
  - python=3.12
  - git
  - pip
  - pip:
      # ── coderecon (built wheel) ────────────────────────────────
      - coderecon
      # ── ONNX Runtime GPU (SPLADE inference) ────────────────────
      - onnxruntime-gpu>=1.17
      # ── scipy for sparse vector ops ────────────────────────────
      - scipy>=1.12
      - numpy>=1.26
      # ── tantivy (full-text index) ──────────────────────────────
      - tantivy>=0.22
      # ── tree-sitter runtime ────────────────────────────────────
      - tree-sitter>=0.23.0
      # ── tree-sitter grammars (all languages) ───────────────────
      # Core / mainstream
      - tree-sitter-python>=0.23.0
      - tree-sitter-javascript>=0.23.0
      - tree-sitter-typescript>=0.23.0
      - tree-sitter-go>=0.23.0
      - tree-sitter-rust>=0.23.0
      # JVM
      - tree-sitter-java>=0.23.0
      - tree-sitter-kotlin>=1.0.0
      - tree-sitter-scala>=0.23.0
      - tree-sitter-groovy>=0.1.0
      # .NET
      - tree-sitter-c-sharp>=0.23.0
      - tree-sitter-fsharp>=0.1.0
      - tree-sitter-vb>=0.1.0
      # Other OO
      - tree-sitter-ruby>=0.23.0
      - tree-sitter-php>=0.23.0
      - tree-sitter-swift>=0.0.1
      - tree-sitter-dart>=0.1.0
      # Systems
      - tree-sitter-c>=0.23.0
      - tree-sitter-cpp>=0.23.0
      - tree-sitter-objc>=0.1.0
      - tree-sitter-zig>=1.1.0
      - tree-sitter-nim>=0.6.0
      - tree-sitter-d>=0.0.1
      - tree-sitter-ada>=0.1.0
      - tree-sitter-fortran>=0.5.0
      - tree-sitter-pascal>=0.1.0
      - tree-sitter-odin>=1.2.0
      - tree-sitter-gleam>=0.1.0
      - tree-sitter-crystal>=0.1.0
      - tree-sitter-v>=0.1.0
      # Functional
      - tree-sitter-elixir>=0.3.0
      - tree-sitter-erlang>=0.9.0
      - tree-sitter-haskell>=0.23.0
      - tree-sitter-ocaml>=0.23.0
      - tree-sitter-reason>=0.1.0
      - tree-sitter-clojure>=0.1.0
      - tree-sitter-elm>=5.8.0
      # Scripting
      - tree-sitter-bash>=0.23.0
      - tree-sitter-fish>=0.0.1
      - tree-sitter-powershell>=0.2.0
      - tree-sitter-lua>=0.2.0
      - tree-sitter-perl>=0.1.0
      - tree-sitter-r>=0.2.0
      - tree-sitter-julia>=0.23.0
      # Web
      - tree-sitter-html>=0.23.0
      - tree-sitter-xml>=0.6.0
      - tree-sitter-css>=0.23.0
      # Hardware
      - tree-sitter-verilog>=1.0.0
      - tree-sitter-vhdl>=0.2.0
      # Data / config
      - tree-sitter-hcl>=1.0.0
      - tree-sitter-sql>=0.3.0
      - tree-sitter-dockerfile>=0.2.0
      - tree-sitter-markdown>=0.3.0
      - tree-sitter-json>=0.24.0
      - tree-sitter-yaml>=0.6.0
      - tree-sitter-toml>=0.6.0
      - tree-sitter-graphql>=0.1.0
      - tree-sitter-nix>=0.3.0
      - tree-sitter-proto>=0.1.0
      # Build systems
      - tree-sitter-make>=1.1.0
      - tree-sitter-cmake>=0.5.0
      - tree-sitter-meson>=0.1.0
      - tree-sitter-starlark>=0.1.0
      - tree-sitter-just>=0.1.0
      # Other
      - tree-sitter-asm>=0.1.0
      - tree-sitter-rst>=0.1.0
      - tree-sitter-asciidoc>=0.1.0
