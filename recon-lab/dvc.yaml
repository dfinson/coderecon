# Recon Lab — DVC Pipeline
#
# Stages map 1:1 to CLI commands. Run the full pipeline:
#   dvc repro
#
# Run a single stage:
#   dvc repro train
#
# Pipeline DAG (PR-based):
#   clone ──→ pr-select ──→ pr-checkout ──→ pr-import ──→ non-ok-queries ──→ collect ──→ merge ──→ train ──→ eval
#
# Pass 1 (clone): Full clone of all 96 repos at HEAD.
# Pass 2 (pr-select): GitHub API → select PRs, compute diffs, write pr_instances.jsonl.
# Pass 3 (pr-checkout): Create worktrees at PR base commits.
#          The daemon handles indexing (main + worktrees) natively via register-worktree.
# Pass 4 (pr-import): diff → GT defs + GPT-4.1-nano OK query generation.
# Pass 5 (non-ok-queries): Copilot SDK agent → UNSAT/BROAD/AMBIG queries per repo.
# Pass 6+ (collect → merge → train → eval).

stages:
  clone:
    cmd: recon-lab clone --set all
    deps:
      - src/cpl_lab/pipeline/clone.py
    outs:
      - ${workspace}/clones:
          persist: true    # don't delete on repro
          cache: false     # too large to cache

  pr-select:
    cmd: recon-lab pr-select --set all
    deps:
      - src/cpl_lab/pipeline/pr_select.py
      - src/cpl_lab/pipeline/patch_ground_truth.py
      - ${workspace}/clones
    params:
      - lab.toml:
          - pr_select
    outs:
      - ${workspace}/data/pr_instances.jsonl:
          cache: false

  pr-checkout:
    cmd: recon-lab pr-checkout --set all
    deps:
      - src/cpl_lab/pipeline/pr_checkout.py
      - ${workspace}/data/pr_instances.jsonl
    outs:
      - ${workspace}/data/pr_checkout.stamp:
          cache: false

  pr-import:
    cmd: recon-lab pr-import --set all
    deps:
      - src/cpl_lab/pipeline/pr_import.py
      - src/cpl_lab/llm/llm_queries.py
      - src/cpl_lab/pipeline/patch_ground_truth.py
      - ${workspace}/data/pr_checkout.stamp
    params:
      - lab.toml:
          - pr_select
    outs:
      - ${workspace}/data/pr_import.stamp:
          cache: false

  non-ok-queries:
    cmd: recon-lab non-ok-queries --set all
    deps:
      - src/cpl_lab/pipeline/non_ok_queries.py
      - ${workspace}/data/pr_import.stamp
    outs:
      - ${workspace}/data/non_ok_queries.stamp:
          cache: false

  collect:
    cmd: recon-lab collect --set all && date -Iseconds > ${workspace}/data/signals.stamp
    deps:
      - src/cpl_lab/collect/collect_signals.py
      - ${workspace}/data/non_ok_queries.stamp
    outs:
      - ${workspace}/data/signals.stamp:
          cache: false

  merge:
    cmd: recon-lab merge --what all
    deps:
      - src/cpl_lab/collect/merge_ground_truth.py
      - src/cpl_lab/collect/merge_signals.py
      - ${workspace}/data/signals.stamp
    outs:
      - ${workspace}/data/merged/runs.parquet
      - ${workspace}/data/merged/touched_objects.parquet
      - ${workspace}/data/merged/queries.parquet
      - ${workspace}/data/merged/candidates_rank.parquet

  train:
    cmd: recon-lab train --model all
    deps:
      - src/cpl_lab/training/train_all.py
      - ${workspace}/data/merged/candidates_rank.parquet
    outs:
      - ${workspace}/models/def_ranker.lgbm
      - ${workspace}/models/file_ranker_structural.lgbm
      - ${workspace}/models/gate_structural.lgbm
      - ${workspace}/models/cutoff_structural.lgbm

  eval:
    cmd: recon-lab eval
    deps:
      - src/cpl_lab/eval/run.py
      - src/cpl_lab/eval/models/ranking.py
      - src/cpl_lab/eval/metrics/ranking.py
      - src/cpl_lab/eval/metrics/gate.py
      - src/cpl_lab/eval/datasets/eval_gt.py
      - ${workspace}/models/def_ranker.lgbm
      - ${workspace}/models/file_ranker_structural.lgbm
      - ${workspace}/models/gate_structural.lgbm
      - ${workspace}/models/cutoff_structural.lgbm
    metrics:
      - ${workspace}/eval/metrics.json:
          cache: false
    plots:
      - ${workspace}/eval/plots/:
          cache: false

  splade-bakeoff:
    cmd: recon-lab splade-bakeoff
    deps:
      - src/cpl_lab/experiments/splade_bakeoff/run.py
      - src/cpl_lab/experiments/splade_bakeoff/scaffold.py
      - src/cpl_lab/experiments/splade_bakeoff/encoder.py
      - ${workspace}/data/pr_import.stamp
    params:
      - lab.toml:
          - splade_bakeoff
    metrics:
      - ${workspace}/experiments/splade_bakeoff/metrics.json:
          cache: false
    plots:
      - ${workspace}/experiments/splade_bakeoff/per_query.parquet:
          cache: false
    outs:
      - ${workspace}/experiments/splade_bakeoff/term_samples_splade-v3-distilbert.json:
          cache: false
      - ${workspace}/experiments/splade_bakeoff/term_samples_splade-mini.json:
          cache: false
      - ${workspace}/experiments/splade_bakeoff/term_samples_opensearch-v2.json:
          cache: false

# DVC params — workspace resolves from lab.toml
vars:
  - workspace: ~/.recon/recon-lab
